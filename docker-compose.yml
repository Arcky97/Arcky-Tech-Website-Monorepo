version: "3.9"

services:
  web:
    image: ghcr.io/arcky97/arcky-tech-web:main
    restart: unless-stopped
    ports:
      - "3090:3000"
    environment:
      - RESEND_API_KEY=${RESEND_API_KEY}
      - NEXT_PUBLIC_DOCS_URL=${NEXT_PUBLIC_DOCS_URL}
      - NEXT_PUBLIC_DISCORD_URL=${NEXT_PUBLIC_DISCORD_URL}
      - HOSTNAME=0.0.0.0
      - PORT=3000

  docs:
    image: ghcr.io/arcky97/arcky-tech-docs:main
    restart: unless-stopped
    ports:
      - "3091:3000"
    environment:
      - NEXT_PUBLIC_WEB_URL=${NEXT_PUBLIC_WEB_URL}
      - NEXT_PUBLIC_DISCORD_URL=${NEXT_PUBLIC_DISCORD_URL}
      - HOSTNAME=0.0.0.0
      - PORT=3000

  scoreboard:
    image: ghcr.io/arcky97/arcky-tech-scoreboard:main
    restart: unless-stopped
    ports:
      - "3093:3000"

  dashboard:
    image: ghcr.io/arcky97/arcky-tech-dashboard:main
    restart: unless-stopped
    ports:
      - "3092:3000"